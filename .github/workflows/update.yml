name: Update README

on:
  push:
    paths:
      - 'data/projects.json'
      - 'scripts/**'
  schedule:
    - cron: '0 0 * * 0' # Berjalan otomatis setiap hari Minggu tengah malam (UTC)
  workflow_dispatch: # Mengaktifkan tombol run manual

# PERBAIKAN 1: Memberikan izin kepada bot untuk melakukan 'git push'
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # PERBAIKAN 2: Menggunakan actions v4 untuk menghilangkan warning
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # PERBAIKAN 3: Menggunakan actions v5 untuk menghilangkan warning
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
          
      - name: Run update script
        run: python scripts/update_readme.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "sys: auto-sync projects and google scholar data" || exit 0
          git pull --rebase origin main
          git push origin main