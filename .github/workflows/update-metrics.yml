name: Generate GitHub Metrics and Snake

on:
  schedule:
    - cron: "0 */12 * * *" # Otomatis update setiap 12 jam
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Prepare Directory
        run: mkdir -p dist

      # 1. Generate Animasi Snake
      - name: Generate GitHub Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Juhenfw
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. Generate Lowlighter Metrics
      - name: Generate Lowlighter Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Juhenfw
          filename: dist/github-metrics.svg # <--- KUNCI 1: Langsung simpan ke folder dist, menghapus langkah 'mv'
          base: header, activity, community, repositories
          config_timezone: Asia/Jakarta
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 6
          output_action: none
          plugins_errors_fatal: yes # <--- KUNCI 2: Memaksa robot jujur menunjukkan eror aslinya jika gagal

      # 3. Push ke branch 'output' (Langkah mv sudah dihapus karena tidak diperlukan lagi!)
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}